<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Bipolar Bros</title>
    <style>
        :root {
            --primary-blue: #1a3a5f;
            --light-blue: #0077b6;
            --background: #f4f7f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background);
            color: var(--primary-blue);
            line-height: 1.6;
        }

        nav {
            background: var(--primary-blue);
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: bold;
            margin: 0 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover { color: #8ecae6; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-header h1 { font-size: 2.8rem; margin-bottom: 10px; color: var(--primary-blue); }
        .gallery-header p { font-size: 1.2rem; color: #555; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .photo-item {
            background: var(--white);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }

        .photo-item:hover { transform: translateY(-8px); }

        .photo-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
        }

        .caption {
            padding: 15px 5px 5px 5px;
            font-weight: bold;
            text-align: center;
            color: var(--primary-blue);
            font-size: 1.1rem;
        }

        footer { text-align: center; padding: 60px 40px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="gallery.html">Gallery</a>
    </nav>

    <div class="container">
        <div class="gallery-header">
            <h1>The Journey</h1>
            <p>Advocacy, public speaking, and moments from the road.</p>
        </div>

        <div class="photo-grid">
            <div class="photo-item">
                <img src="steve1.jpeg" alt="Steve Griffith">
                <div class="caption">Stephen Griffith</div>
            </div>

            <div class="photo-item">
                <img src="steve2.jpeg" alt="Steve Griffith Advocacy">
                <div class="caption">Mental Health Awareness</div>
            </div>

            <div class="photo-item">
                <img src="whitehouse1.jpeg" alt="Washington DC Trip">
                <div class="caption">D.C. Speaking Engagement</div>
            </div>

            <div class="photo-item">
                <img src="whitehouse2.jpeg" alt="Washington DC Landmarks">
                <div class="caption">National Mall, D.C.</div>
            </div>

            <div class="photo-item">
                <img src="steve3.jpeg" alt="Stephen Griffith Speaking">
                <div class="caption">Outreach & Connection</div>
            </div>

             <div class="photo-item">
                <img src="whitehouse3.jpeg" alt="Washington DC Trip Highlights">
                <div class="caption">The Bipolar Bros Mission</div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Bipolar Bros. All rights reserved.</footer>
</body>
</html>
